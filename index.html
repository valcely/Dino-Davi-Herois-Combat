<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Davi - Batalha Épica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bg"></div>

    <section id="menu" class="screen active">
        <h1 class="game-title">DINO<br>DAVI</h1>
        <button class="btn-play" onclick="initSelection()">
            JOGAR AGORA!
        </button>
    </section>

    <section id="selection" class="screen">
        <h2>QUEM É VOCÊ?</h2>
        <div id="heroList" class="hero-grid"></div>
    </section>

    <section id="fight" class="screen">
        
        <div class="hud">
            <div class="player-hud">
                <h3 id="p1-name">Jogador</h3>
                <div class="life-bar-wrap"><div id="hp1" class="life-fill"></div></div>
            </div>
            
            <div class="vs-label">VS</div>

            <div class="enemy-hud">
                <h3 id="p2-name">Inimigo</h3>
                <div class="life-bar-wrap"><div id="hp2" class="life-fill"></div></div>
            </div>
        </div>

        <div class="fight-container">
            <div id="p1-dino" class="dino-fighter p1-sprite"></div>
            <div id="p2-dino" class="dino-fighter p2-sprite"></div>
        </div>

        <div class="action-area">
            <button class="btn-punch" onclick="ataqueP1()">💥</button>
            <p class="instrucao">Clica rápido!</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
