<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Davi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bg" class="scientist-bg"></div>

    <section id="menu" class="screen active">
        <h1 class="game-title">DINO DAVI</h1>
        <button class="hero-card" style="width: 280px; margin-top: 50px;" onclick="initSelection()">
            <img src="https://cdn-icons-png.flaticon.com/512/2591/2591933.png">
            <p>JOGAR AGORA!</p>
        </button>
    </section>

    <section id="selection" class="screen">
        <h2 style="color: gold; font-size: 2rem;">QUEM É VOCÊ?</h2>
        <div id="heroList" class="hero-grid"></div>
    </section>

    <section id="fight" class="screen">
        <div class="life-bar-wrap"><div id="hp2" class="life-fill"></div></div>
        <div class="fight-container">
            <div id="p1-dino" class="dino-fighter"></div>
            <div id="p2-dino" class="dino-fighter"></div>
        </div>
        <div class="action-area">
            <button class="btn-punch" onclick="ataqueP1()">💥</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
