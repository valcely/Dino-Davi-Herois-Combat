<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Davi Dino Heróis ⚡</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ╔══════════════════════════════════════════════╗ -->

<!-- ║  CANVAS DE ESTRELAS (fundo animado)          ║ -->

<!-- ╚══════════════════════════════════════════════╝ -->

<canvas id="starCanvas"></canvas>

<!-- ╔══════════════════════════════════════════════╗ -->

<!-- ║  TELA 1 — INÍCIO                            ║ -->

<!-- ╚══════════════════════════════════════════════╝ -->

<div id="homeScreen" class="screen">

  <div class="topbar">
    <div class="topbar-clock" id="clockEl">00:00:00</div>
    <div class="topbar-logo">🦕 DAVI DINO</div>
    <div class="topbar-date" id="dateEl">--/--/----</div>
  </div>

  <div class="home-content">
    <div class="home-logo">
      <div class="logo-line1">DAVI DINO</div>
      <div class="logo-line2">HERÓIS ⚡</div>
      <div class="logo-sub">✦ EDIÇÃO JURÁSSICA ✦ 13 PERSONAGENS ✦</div>
    </div>

```
<canvas id="homePreview" width="400" height="110"></canvas>

<div class="home-menu">
  <button class="menu-btn fight" onclick="gotoSelect()">
    <span class="mico">⚔️</span><span>BATALHA DE DINOS</span>
  </button>
  <button class="menu-btn memory" onclick="gotoMemory()">
    <span class="mico">🧠</span><span>JOGO DA MEMÓRIA</span>
  </button>
  <button class="menu-btn paint" onclick="gotoPaint()">
    <span class="mico">🎨</span><span>PINTURA DE DINOS</span>
  </button>
</div>
```

  </div>

</div>

<!-- ╔══════════════════════════════════════════════╗ -->

<!-- ║  TELA 2 — SELEÇÃO DE PERSONAGEM             ║ -->

<!-- ╚══════════════════════════════════════════════╝ -->

<div id="selectScreen" class="screen hidden">

  <div class="sel-header">
    <h2>🦕 ESCOLHA SEU DINO</h2>
    <div class="sel-mode-tabs">
      <button class="mode-tab active" id="tab1p" onclick="setMode('1p')">👤 1 JOGADOR</button>
      <button class="mode-tab"        id="tab2p" onclick="setMode('2p')">👥 2 JOGADORES</button>
    </div>
  </div>

  <div class="sel-vs-preview">
    <div class="vs-slot">
      <canvas id="vsC1" width="80" height="72"></canvas>
      <div class="vs-slot-name" id="vsN1" style="color:var(--green)">P1</div>
    </div>
    <div class="vs-mid">VS</div>
    <div class="vs-slot">
      <canvas id="vsC2" width="80" height="72"></canvas>
      <div class="vs-slot-name" id="vsN2" style="color:var(--blue)">CPU</div>
    </div>
  </div>

  <div class="char-grid" id="charGrid"></div>

  <div class="sel-bottom">
    <button class="sel-btn btn-back"  onclick="gotoHome()">← VOLTAR</button>
    <button class="sel-btn btn-fight" onclick="startFight()">LUTAR! ⚡</button>
  </div>

</div>

<!-- ╔══════════════════════════════════════════════╗ -->

<!-- ║  TELA 3 — BATALHA                           ║ -->

<!-- ╚══════════════════════════════════════════════╝ -->

<div id="fightScreen" class="screen hidden">

  <!-- HUD: barras de vida -->

  <div id="fightHUD">
    <div class="hpg" id="hudL"></div>
    <div id="hudVS">VS</div>
    <div class="hpg" id="hudR"></div>
  </div>

  <!-- Barras de especial -->

  <div id="spBars">
    <div class="spstrip"   id="sp1"></div>
    <div class="spstrip r" id="sp2"></div>
  </div>

  <!-- Canvas do jogo -->

<canvas id="gameCanvas"></canvas>

  <!-- Controles touch -->

  <div id="touchCtrl">
    <div class="cside"    id="ctrlL"></div>
    <div class="cmid"     id="ctrlMid">AI</div>
    <div class="cside cr" id="ctrlR"></div>
  </div>

</div>

<!-- ╔══════════════════════════════════════════════╗ -->

<!-- ║  TELA 4 — RESULTADO                         ║ -->

<!-- ╚══════════════════════════════════════════════╝ -->

<div id="resultScreen" class="screen hidden">

<canvas id="resultBeams"></canvas>

  <div id="rCard">
    <div class="rmast" id="rMast">
      <span>DAVI DINO HERÓIS</span>
      <span>VITÓRIA! 🏆</span>
    </div>
    <div class="rrole" id="rRole"></div>
    <div class="rname" id="rName"></div>
    <div class="rday"  id="rDay">O HERÓI DO DIA!</div>
    <canvas id="rDinoCanvas" width="140" height="120"></canvas>
    <div class="rplate" id="rPlate">
      <div class="dn" id="rDN"></div>
      <div class="dd" id="rDD"></div>
    </div>
    <div class="rstars">⭐⭐⭐⭐⭐</div>
    <button id="btnAgain">⚡ JOGAR NOVAMENTE</button>
    <div class="rrow">
      <button onclick="gotoSelect()">NOVO DINO</button>
      <button onclick="gotoHome()">INÍCIO</button>
    </div>
  </div>

</div>

<!-- ╔══════════════════════════════════════════════╗ -->

<!-- ║  TELA 5 — JOGO DA MEMÓRIA                   ║ -->

<!-- ╚══════════════════════════════════════════════╝ -->

<div id="memoryScreen" class="screen hidden">

  <div class="mem-header">
    <div class="mem-title">🧠 MEMÓRIA</div>
    <div class="mem-stats">
      <div class="mem-stat">
        <div class="mem-stat-val" id="memMoves">0</div>
        <div class="mem-stat-lbl">JOGADAS</div>
      </div>
      <div class="mem-stat">
        <div class="mem-stat-val" id="memPairs">0</div>
        <div class="mem-stat-lbl">PARES</div>
      </div>
      <div class="mem-stat">
        <div class="mem-stat-val" id="memTime">0s</div>
        <div class="mem-stat-lbl">TEMPO</div>
      </div>
    </div>
  </div>

  <div class="mem-controls">
    <button class="mem-btn mem-back-btn" onclick="gotoHome()">← VOLTAR</button>
    <button class="mem-btn mem-diff"     id="memDiffBtn" onclick="cycleMemDiff()">MÉDIO</button>
    <button class="mem-btn mem-new"      onclick="initMemory()">🔄 NOVO JOGO</button>
  </div>

  <div class="mem-grid pairs-8" id="memGrid"></div>

  <!-- Overlay de vitória -->

  <div class="mem-win hidden" id="memWin">
    <div class="mem-win-card">
      <div class="mem-win-title">🎉 PARABÉNS!</div>
      <div class="mem-win-score" id="memWinScore"></div>
      <button class="mem-win-btn" onclick="initMemory()">JOGAR DE NOVO!</button>
    </div>
  </div>

</div>

<!-- ╔══════════════════════════════════════════════╗ -->

<!-- ║  TELA 6 — PINTURA DE DINOS                  ║ -->

<!-- ╚══════════════════════════════════════════════╝ -->

<div id="paintScreen" class="screen hidden">

  <div class="paint-header">
    <div class="paint-title">🎨 PINTURA</div>
    <div class="paint-palette-row" id="paintPalette"></div>
    <div class="paint-tools">
      <button class="ptool active" id="toolBrush" onclick="setTool('brush')">🖌️</button>
      <button class="ptool"        id="toolFill"  onclick="setTool('fill')">🪣</button>
      <button class="ptool"        id="toolErase" onclick="setTool('erase')">🧹</button>
    </div>
    <div class="brush-row">
      <label>TAM</label>
      <input type="range" class="brush-slider" id="brushSize" min="3" max="45" value="14">
    </div>
  </div>

  <div class="paint-body">
    <div class="paint-dinosel" id="paintDinoSel"></div>
    <canvas id="paintCanvas" width="500" height="380"></canvas>
  </div>

  <div class="paint-footer">
    <button class="p-back"  onclick="gotoHome()">← VOLTAR</button>
    <button class="p-clear" onclick="clearPaint()">🗑️ LIMPAR</button>
    <button class="p-save"  onclick="savePaint()">💾 SALVAR</button>
  </div>

</div>

<!-- ╔══════════════════════════════════════════════╗ -->

<!-- ║  CONTROLES DE TECLADO (legenda PC)          ║ -->

<!-- ╚══════════════════════════════════════════════╝ -->

<!--
  BATALHA — TECLADO PC:
  P1: A/D = mover | ESPAÇO = pular | F = ataque projétil | G = ataque físico | E = especial
  P2: Setas = mover | ArrowUp = pular | K = ataque projétil | J = ataque físico | L = especial
-->

<script src="script.js"></script>

</body>
</html>
