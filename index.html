<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dino Davi Herois Combat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TITLE -->

<div id="titleScreen" class="screen">
  <h1>DINO DAVI</h1>
  <h2>HEROIS COMBAT</h2>
  <p>EDICAO JURASSIC &mdash; 8 DINOSSAUROS</p>
  <canvas id="titlePreview" width="340" height="100"></canvas>
  <div class="title-btns">
    <button id="btn1p">&#127918; 1 JOGADOR vs VILAO</button>
    <button id="btn2p">&#128101; 2 JOGADORES</button>
  </div>
  <div class="title-hint">
    PC P1: A/D mover | ESPACO pular | F atacar | E especial<br>
    PC P2: Setas | ArrowUp pular | K atacar | L especial
  </div>
</div>

<!-- SELECT -->

<div id="selectScreen" class="screen hidden">
  <h3>ESCOLHA SEU LUTADOR</h3>
  <div class="sel-sub" id="selSub">HEROI vs VILAO CPU</div>
  <div class="sel-cols" id="selCols"></div>
  <div class="vs-row">
    <div>
      <canvas id="vsC1" width="80" height="70"></canvas>
      <div class="vs-name" id="vsN1" style="color:#22c55e">P1</div>
    </div>
    <div class="vs-label">VS</div>
    <div>
      <canvas id="vsC2" width="80" height="70"></canvas>
      <div class="vs-name" id="vsN2" style="color:#ef4444">CPU</div>
    </div>
  </div>
  <div class="sel-btns">
    <button id="btnBack">VOLTAR</button>
    <button id="btnFight">LUTAR!</button>
  </div>
</div>

<!-- FIGHT -->

<div id="fightScreen" class="screen hidden">
  <div id="hud">
    <div class="hp-group" id="hudL"></div>
    <div id="hudVS">VS</div>
    <div class="hp-group" id="hudR"></div>
  </div>
  <div id="spbars">
    <div class="sp-strip" id="sp1"></div>
    <div class="sp-strip right" id="sp2"></div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="controls">
    <div class="ctrl-side" id="ctrlL"></div>
    <div class="ctrl-mid" id="ctrlMid">CPU</div>
    <div class="ctrl-side right" id="ctrlR"></div>
  </div>
</div>

<!-- RESULT -->

<div id="resultScreen" class="screen hidden">
  <canvas id="beams"></canvas>
  <div id="rCard">
    <div class="r-masthead" id="rMast"><span>DINO DAVI COMBAT</span><span>VITORIA</span></div>
    <div class="r-role" id="rRole"></div>
    <div class="r-name" id="rName"></div>
    <div class="r-day"  id="rDay">O HEROI DO DIA!</div>
    <canvas id="rDinoCanvas" width="120" height="100"></canvas>
    <div class="r-plate" id="rPlate">
      <div class="dn" id="rDN"></div>
      <div class="dd" id="rDD"></div>
    </div>
    <div class="r-stars">&#11088;&#11088;&#11088;&#11088;&#11088;</div>
    <button id="btnAgain">JOGAR NOVAMENTE</button>
    <div class="r-row">
      <button id="btnNewChar">NOVO LUTADOR</button>
      <button id="btnHome">INICIO</button>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
