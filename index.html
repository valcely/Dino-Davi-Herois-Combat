<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Davi: 18 Heroes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scientist-bg" id="bgIcons"></div>

    <section id="titleScreen" class="screen active">
        <h1 class="game-title">DINO DAVI</h1>
        <p style="color: var(--j-accent); letter-spacing: 3px;">18 SUPER DINOS</p>
        <button class="btn-main" style="padding:15px; width:250px; background:gold; border-radius:20px; font-weight:bold; margin-top:10px" onclick="initHeroSelect()">🦖 ESCOLHER HERÓI</button>
        <button class="btn-main" style="padding:15px; width:250px; background:white; border-radius:20px; font-weight:bold; margin-top:10px" onclick="initMemory()">🧩 MEMÓRIA</button>
    </section>

    <section id="selectScreen" class="screen">
        <h2 style="color: gold; margin-bottom: 10px;">SELECIONE (18 OPÇÕES)</h2>
        <div id="heroList"></div>
        <button onclick="location.reload()" style="margin-top:10px; padding:10px">VOLTAR</button>
    </section>

    <section id="fightScreen" class="screen">
        <div style="display:flex; width:100%; justify-content:space-between; margin-bottom:10px">
            <div style="width:40%; border:2px solid #fff; height:20px"><div id="hp1" class="hp-fill"></div></div>
            <div style="width:40%; border:2px solid #fff; height:20px"><div id="hp2" class="hp-fill"></div></div>
        </div>
        <canvas id="fightCanvas"></canvas>
        <div style="display:flex; gap:20px; margin-top:15px">
            <button onclick="atacar()" style="width:80px; height:80px; border-radius:50%; background:red; color:white; font-weight:bold">SOCO</button>
            <button onclick="especial()" style="width:80px; height:80px; border-radius:50%; background:blue; color:white; font-weight:bold">PODER</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
