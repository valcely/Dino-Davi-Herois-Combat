<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO-INVINCIBLE: GUERRA JURÁSSICA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="titleScreen" class="screen">
        <h1>OMNI-REX</h1>
        <h2>GUERRA INVENCÍVEL</h2>
        <div class="title-btns">
            <button id="btn1p">1 JOGADOR (VS CPU)</button>
            <button id="btn2p">2 JOGADORES (LOCAL)</button>
        </div>
        <p>AGÊNCIA DE DEFESA GLOBAL - SETOR JURÁSSICO</p>
    </div>

    <!-- TELA DE SELEÇÃO -->
    <div id="selectScreen" class="screen hidden">
        <h3 class="comic-title">ESCOLHA SEU CAMPEÃO</h3>
        <div class="sel-sub">SELECIONE O DINOSSAURO PARA A BATALHA</div>
        
        <div class="sel-cols" id="selCols">
            <!-- Os cards são gerados automaticamente pelo Script.js -->
        </div>

        <div class="vs-row">
            <div class="vs-box">
                <div id="vsN1" class="vs-name">HERÓI</div>
                <div class="vs-label">VS</div>
                <div id="vsN2" class="vs-name">VILÃO</div>
            </div>
        </div>

        <div class="sel-btns">
            <button id="btnBack">VOLTAR</button>
            <button id="btnFight">LUTAR!</button>
        </div>
    </div>

    <!-- TELA DE LUTA (ARENA JURASSIC PARK) -->
    <div id="fightScreen" class="screen hidden">
        <div id="hud">
            <div class="hp-group">
                <div class="hp-name" id="p1NameDisplay">PLAYER 1</div>
                <div class="hp-bg"><div id="p1hp" class="hp-fill" style="width: 100%;"></div></div>
            </div>
            
            <div id="hudVS">VS</div>

            <div class="hp-group">
                <div class="hp-name right" id="p2NameDisplay">VILÃO</div>
                <div class="hp-bg"><div id="p2hp" class="hp-fill" style="width: 100%;"></div></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- CONTROLES ESTILO ARCADE HQ -->
        <div id="controls">
            <div class="ctrl-side">
                <button class="act-btn btn-jump">PULAR</button>
                <button class="act-btn btn-atk">ATACAR</button>
            </div>
            
            <div class="ctrl-mid">INVINCIBLE<br>BATTLE</div>

            <div class="ctrl-side right">
                <button class="act-btn btn-sp">PODER<br>ESPECIAL</button>
            </div>
        </div>
    </div>

    <!-- TELA DE RESULTADO -->
    <div id="resultScreen" class="screen hidden">
        <div id="rCard">
            <h1 class="r-name" id="winnerName">VITÓRIA!</h1>
            <div class="r-row">
                <button id="btnAgain">REVANCHE</button>
                <button id="btnHome" onclick="location.reload()">MENU</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
