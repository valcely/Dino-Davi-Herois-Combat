<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dino Davi Herois Combat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="titleScreen" class="screen">
    <h1>DINO DAVI</h1>
    <h2>HEROIS COMBAT</h2>
    <p>EDICAO JURASSIC &mdash; 8 DINOSSAUROS</p>
    <canvas id="titlePreview" width="340" height="100"></canvas>
    <div class="title-btns">
      <button id="btn1p">&#127918; 1 JOGADOR vs VILAO</button>
      <button id="btn2p">&#128101; 2 JOGADORES</button>
    </div>
    <div class="title-hint">
      PC P1: A/D mover | ESPACO pular | F atacar | E especial<br>
      PC P2: Setas | ArrowUp pular | K atacar | L especial
    </div>
  </div>

  <div id="selectScreen" class="screen hidden">
    <h3>ESCOLHA SEU LUTADOR</h3>
    <div class="sel-sub" id="selSub">HEROI vs VILAO CPU</div>
    <div class="sel-cols" id="selCols"></div>
    <div class="vs-row">
      <div>
        <canvas id="vsC1" width="80" height="70"></canvas>
        <div class="vs-name" id="vsN1" style="color:#22c55e">P1</div>
      </div>
      <div class="vs-label">VS</div>
      <div>
        <canvas id="vsC2" width="80" height="70"></canvas>
        <div class="vs-name" id="vsN2" style="color:#ef4444">CPU</div>
      </div>
    </div>
    <div class="sel-btns">
      <button id="btnBack">VOLTAR</button>
      <button id="btnFight">LUTAR!</button>
    </div>
  </div>

  <div id="fightScreen" class="screen hidden">
    <div id="hud">
      <div class="hp-group" id="hudL">
        <div class="hp-name" id="p1Name">P1</div>
        <div class="hp-bg"><div id="p1hp" class="hp-fill" style="width:100%"></div></div>
      </div>
      <div id="hudVS">VS</div>
      <div class="hp-group" id="hudR">
        <div class="hp-name right" id="p2Name">CPU</div>
        <div class="hp-bg"><div id="p2hp" class="hp-fill" style="width:100%"></div></div>
      </div>
    </div>
    
    <div id="spbars">
      <div class="sp-strip" id="sp1">
        <div class="sp-track"><div id="p1sp" class="sp-fill" style="width:0%"></div></div>
      </div>
      <div class="sp-strip right" id="sp2">
        <div class="sp-track"><div id="p2sp" class="sp-fill" style="width:0%"></div></div>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
      <div class="ctrl-side" id="ctrlL">
        <button id="btnJump1" class="act-btn btn-jump">PULAR</button>
        <button id="btnAtk1" class="act-btn btn-atk">ATACAR</button>
      </div>
      <div class="ctrl-mid" id="ctrlMid">CPU</div>
      <div class="ctrl
