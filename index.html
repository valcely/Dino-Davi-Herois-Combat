<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Davi & Heróis - Jurassic Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div class="lab-overlay"></div>

    <section id="titleScreen" class="screen active">
        <div class="main-content">
            <h1 class="game-title">DINO <span class="highlight">DAVI</span></h1>
            <span class="game-subtitle">JURASSIC MEMORY</span>
            <div class="menu-grid">
                <button class="btn-main" onclick="initMemory()">JOGAR AGORA</button>
            </div>
        </div>
    </section>

    <section id="gameArea" class="screen">
        <div class="hud">
            <button class="back-btn" onclick="location.reload()">🏠 SAIR</button>
            <div class="score-board">PARES: <span id="pair-count">0</span> / 18</div>
        </div>
        <div id="memory-grid" class="memory-grid">
            </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
